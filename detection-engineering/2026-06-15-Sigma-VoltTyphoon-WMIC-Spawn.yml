title: Volt Typhoon - WMIC Silent Process Spawn
id: d4a6f125-6a7b-7e5d-cf4a-3b8c9d0e1f2a
status: experimental
description: Detects wmic being used to spawn a hidden PowerShell process, breaking the parent-child process chain to evade EDR telemetry. Used by Volt Typhoon to execute payloads without visible windows or standard process lineage.
author: Nedheesh Hasija
date: 2026-06-15
references:
    - https://attack.mitre.org/techniques/T1047/
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-144a
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1047
    - attack.t1564.003
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\wmic.exe'
        CommandLine|contains|all:
            - 'process'
            - 'call create'
            - 'powershell'
            - 'windowstyle hidden'
    condition: selection
falsepositives:
    - Legitimate automation scripts using WMIC to spawn background PowerShell tasks
    - Software deployment tools — correlate with known change windows
level: high