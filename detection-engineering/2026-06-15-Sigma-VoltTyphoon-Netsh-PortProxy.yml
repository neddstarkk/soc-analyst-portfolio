title: Volt Typhoon - Netsh Port Proxy Creation
id: a1f3c892-3d4e-4b2a-9c1d-0e5f6a7b8c9d
status: experimental
description: Detects netsh portproxy commands used by Volt Typhoon to tunnel C2 traffic through compromised SOHO routers, masking external communication as internal lateral movement.
author: Nedheesh Hasija
date: 2026-06-15
references:
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-144a
tags:
    - attack.command_and_control
    - attack.t1090.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\netsh.exe'
        CommandLine|contains|all:
            - 'portproxy'
            - 'add'
            - 'listenport'
            - 'connectaddress'
    condition: selection
falsepositives:
    - Legitimate network administrators configuring port forwarding via netsh
    - VPN or RDP gateway configurations using portproxy
level: high