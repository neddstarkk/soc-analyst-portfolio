title: Volt Typhoon - NTDS Credential Database Dump via Ntdsutil
id: c3f5e014-5f6a-6d4c-be3f-2a7b8c9d0e1f
status: experimental
description: Detects ntdsutil IFM commands used to create a full copy of the Active Directory database. This technique generates ntds.dit and the SYSTEM hive, enabling offline credential extraction of every domain account without triggering additional DC alerts.
author: Nedheesh Hasija
date: 2026-06-15
references:
    - https://attack.mitre.org/techniques/T1003.003/
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-144a
tags:
    - attack.credential_access
    - attack.t1003.003
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\ntdsutil.exe'
        CommandLine|contains|all:
            - 'ifm'
            - 'create full'
    condition: selection
falsepositives:
    - Legitimate domain controller backup operations performed by AD administrators
    - RODC promotion activities using IFM — validate with change management records
level: critical